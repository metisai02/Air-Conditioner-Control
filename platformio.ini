; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp12e_sender]
platform = espressif8266
board = esp12e
framework = arduino
monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0
build_flags = -D_IR_ENABLEDEFAULT=false
                      -DECODE_KELON168=true
                      -DSEND_KELON168=true
build_src_filter = +<main_sender.cpp> -<main_receiver.cpp>

[env:esp12e_receiver]
platform = espressif8266
board = esp12e
framework = arduino
monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0
; Enable for all of the default decoders, or just the ones you need to save space
build_flags = -D_IR_ENABLEDEFAULT=true
                    ;   -DECODE_KELON168=true
                      -DSEND_KELON168=false
build_src_filter = +<main_receiver.cpp> -<main_sender.cpp>